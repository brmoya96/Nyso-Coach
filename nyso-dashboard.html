<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080810">
<title>Nyso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#080810;--card:#141420;--edge:#1e1e30;--txt:#f0f0fa;--soft:#9090b0;--faint:#3a3a55;--na:#2a2a40;--teal:#00e5c8;--amber:#ffb830;--rose:#ff4d6d;--violet:#9b6dff;--blue:#4d9fff;--lime:#a3ff6d;--g:linear-gradient(135deg,#141420,#0e0e1a)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--ink);color:var(--txt);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--edge);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bname{font-size:14px;font-weight:700;letter-spacing:.08em;font-family:'Space Mono',monospace}
.bsub{font-size:9px;color:var(--soft);letter-spacing:.1em;text-transform:uppercase}
.sbtn{background:var(--teal);border:none;border-radius:8px;padding:8px 14px;color:#080810;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer;letter-spacing:.05em;flex-shrink:0;transition:opacity .2s}
.sbtn:active{opacity:.7}
.nav{display:flex;gap:2px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--edge)}
.nav::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:var(--soft);border-bottom:2px solid transparent;font-family:'Space Mono',monospace;margin-bottom:-1px;transition:color .15s}
.tab.a{color:var(--teal);border-color:var(--teal)}
.sec{display:none;padding-bottom:60px}
.sec.a{display:block}
.card{background:var(--g);border:1px solid var(--edge);border-radius:14px;padding:15px 16px;margin:10px 12px 0}
.chd{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-family:'Space Mono',monospace;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.loader{text-align:center;padding:60px 20px;color:var(--soft);font-size:12px;font-family:'Space Mono',monospace}
.spin{width:26px;height:26px;border:2px solid var(--edge);border-top-color:var(--teal);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 14px}
@keyframes rot{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;align-items:flex-end}
.modal{background:#0e0e1a;border-radius:20px 20px 0 0;border:1px solid var(--edge);border-bottom:none;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 40px}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:14px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--edge);border:none;color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.metric-def{background:rgba(0,229,200,.06);border:1px solid rgba(0,229,200,.15);border-radius:12px;padding:13px 14px;margin-bottom:12px;font-size:11px;line-height:1.7;color:var(--soft)}
.metric-def b{color:var(--teal)}

/* HERO */
.hero{display:flex;align-items:center;gap:14px;margin:10px 12px 0;background:var(--g);border-radius:18px;padding:18px;border:1px solid var(--edge);cursor:pointer;-webkit-tap-highlight-color:rgba(0,229,200,.15);touch-action:manipulation;user-select:none;-webkit-user-select:none}
.hero:active{opacity:.7;transform:scale(.99)}
.rw{position:relative;flex-shrink:0}
.rs{transform:rotate(-90deg);display:block}
.rb2{fill:none;stroke:var(--edge)}
.ra{fill:none;stroke-linecap:round;transition:stroke-dasharray 1.4s cubic-bezier(.4,0,.2,1)}
.ri{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rn{font-size:24px;font-weight:700;font-family:'Space Mono',monospace;line-height:1}
.ru{font-size:9px;color:var(--soft)}
.hr{flex:1;min-width:0}
.hl{font-size:9px;color:var(--soft);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace}
.hs{font-size:17px;font-weight:700;margin-top:3px}
.hp{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.pi{font-size:9px;font-family:'Space Mono',monospace;font-weight:700;padding:2px 7px;border-radius:20px;cursor:pointer}
.pg{background:#00e5c818;color:var(--teal);border:1px solid #00e5c835}
.pb{background:#4d9fff18;color:var(--blue);border:1px solid #4d9fff35}
.pv{background:#9b6dff18;color:var(--violet);border:1px solid #9b6dff35}
.pa{background:#ffb83018;color:var(--amber);border:1px solid #ffb83035}
.pl{background:#a3ff6d18;color:var(--lime);border:1px solid #a3ff6d35}
.stale{font-size:9px;color:var(--amber);font-family:'Space Mono',monospace;margin-top:5px}
.tap-hint{font-size:9px;color:var(--faint);margin-top:4px;font-family:'Space Mono',monospace}

/* METRIC CARDS */
.mc{background:var(--g);border:1px solid var(--edge);border-radius:14px;padding:14px 16px;margin:10px 12px 0;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:rgba(0,229,200,.1);transition:border-color .2s,opacity .15s;font-family:inherit;color:inherit}
.mc:active{border-color:var(--teal);opacity:.8}
button.hero,button.mc{background:var(--g);font-family:inherit;color:inherit;display:flex}
.ml2{font-size:9px;color:var(--soft);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace}
.mv{font-size:21px;font-weight:700;font-family:'Space Mono',monospace;line-height:1.1;margin-top:2px}
.mbase{font-size:9px;color:var(--faint);margin-top:1px}
.bar{height:5px;background:var(--edge);border-radius:3px;overflow:hidden;margin:6px 0}
.bf{height:100%;border-radius:3px;transition:width 1.3s ease}
.ins{font-size:11px;color:var(--soft);line-height:1.6;padding:9px 12px;background:rgba(0,0,0,.25);border-radius:9px;border-left:2px solid var(--faint);margin-top:6px}
.mc-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mc-row>div:first-child{flex:1;min-width:0}
.mc-arrow{font-size:16px;color:var(--faint);flex-shrink:0;padding-top:4px}

/* CHART */
.cw{width:100%;overflow:hidden}
.csv{width:100%;display:block}
.cleg{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--soft);font-family:'Space Mono',monospace}
.ld{width:10px;height:3px;border-radius:2px}
.rbs{display:flex;gap:4px;flex-wrap:wrap}
.rb3{padding:4px 8px;border-radius:6px;font-size:9px;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer;background:var(--edge);color:var(--soft);border:1px solid transparent}
.rb3.a{background:#00e5c818;color:var(--teal);border-color:#00e5c840}

/* GRID */
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ci{text-align:center;padding:10px 4px;background:rgba(0,0,0,.2);border-radius:10px}
.cl3{font-size:9px;color:var(--soft);text-transform:uppercase;font-family:'Space Mono',monospace}
.cv3{font-size:21px;font-weight:700;font-family:'Space Mono',monospace;margin-top:2px}
.cs{font-size:9px;color:var(--faint);margin-top:1px}

/* TABLE */
.vt{width:100%;border-collapse:collapse;font-size:11px;font-family:'Space Mono',monospace}
.vt th{font-size:9px;color:var(--soft);letter-spacing:.08em;text-transform:uppercase;padding:6px 6px;border-bottom:1px solid var(--edge);text-align:left;font-weight:600}
.vt td{padding:8px 6px;border-bottom:1px solid var(--edge);vertical-align:middle}
.vt tr:last-child td{border-bottom:none}

/* HIST TABLE */
.ht{width:100%;border-collapse:collapse;font-size:10px;font-family:'Space Mono',monospace;margin-top:10px}
.ht th{font-size:9px;color:var(--faint);text-transform:uppercase;padding:4px 6px;border-bottom:1px solid var(--edge);text-align:left}
.ht td{padding:6px 6px;border-bottom:1px solid var(--edge)}
.ht tr:last-child td{border-bottom:none}

/* ACTIVITIES */
.ai{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--edge)}
.ai:last-child{border-bottom:none}
.aic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.aib{flex:1;min-width:0}
.ain{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aim{font-size:10px;color:var(--soft);margin-top:2px;font-family:'Space Mono',monospace}
.ait{font-size:11px;font-weight:700;font-family:'Space Mono',monospace;color:var(--amber);flex-shrink:0}

/* HAWAII */
.hwb{text-align:center;padding:22px;background:var(--g);border-radius:14px;border:1px solid var(--edge);margin:10px 12px 0;position:relative;overflow:hidden}
.hwb::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 110%,#9b6dff18,transparent 65%);pointer-events:none}
.hwn{font-size:50px;font-weight:700;color:var(--violet);font-family:'Space Mono',monospace;line-height:1}
.hwl{font-size:10px;color:var(--soft);margin-top:4px;letter-spacing:.06em}
.hwp{margin-top:12px;font-size:11px;color:var(--soft);line-height:1.9;padding:11px 13px;background:rgba(0,0,0,.3);border-radius:10px;text-align:left}

/* ALERTS */
.ab{margin:10px 12px 0;padding:11px 13px;border-radius:10px;border:1px solid;font-size:11px;line-height:1.5}
.aw{background:#ffb83010;border-color:#ffb83040;color:var(--amber)}
.ag{background:#00e5c810;border-color:#00e5c840;color:var(--teal)}
.ar{background:#ff4d6d10;border-color:#ff4d6d40;color:var(--rose)}

.ref{display:block;margin:14px 12px 0;width:calc(100% - 24px);background:var(--edge);border:1px solid var(--faint);border-radius:11px;padding:13px;color:var(--txt);font-size:12px;font-weight:600;font-family:'Space Mono',monospace;cursor:pointer;letter-spacing:.05em}
.ft{font-size:9px;color:var(--faint);text-align:center;margin-top:12px;font-family:'Space Mono',monospace;padding:0 12px}
.na{color:var(--na)}
.ct{color:var(--teal)}.ca{color:var(--amber)}.cr{color:var(--rose)}.cv2{color:var(--violet)}.cb{color:var(--blue)}.cl2{color:var(--lime)}.cs2{color:var(--soft)}
</style>
</head>
<body>

<!-- MODAL HISTÓRICO -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-hd">
      <div class="modal-title" id="modal-title">Historial</div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="topbar">
  <div class="brand"><div class="dot"></div><div><div class="bname">NYSO</div><div class="bsub">Coach Triatlón</div></div></div>
  <button class="sbtn" id="sb" onclick="syncAll()">↻ SYNC</button>
</div>
<div class="nav">
  <div class="tab a" onclick="show('recovery')">Recovery</div>
  <div class="tab" onclick="show('fitness')">Fitness</div>
  <div class="tab" onclick="show('volume')">Volumen</div>
  <div class="tab" onclick="show('acts')">Sesiones</div>
  <div class="tab" onclick="show('hawaii')">Hawaii</div>
</div>

<div id="recovery" class="sec a"><div id="rc"><div class="loader"><div class="spin"></div>Cargando...</div></div></div>
<div id="fitness"  class="sec"><div id="fc"><div class="loader"><div class="spin"></div>Cargando...</div></div></div>
<div id="volume"   class="sec"><div id="vc"><div class="loader"><div class="spin"></div>Cargando...</div></div></div>
<div id="acts"     class="sec"><div id="ac"><div class="loader"><div class="spin"></div>Cargando...</div></div></div>
<div id="hawaii"   class="sec"><div id="hc"><div class="loader"><div class="spin"></div>Cargando...</div></div></div>

<script>
const SU='https://ooziprpnyoorifmemser.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vemlwcnBueW9vcmlmbWVtc2VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTQ5MjksImV4cCI6MjA5NDE3MDkyOX0.Lrn4NkZYhhDNaJ0mwqhobp6xpNCRKe7--oZGO25VWMw';
const H={apikey:AK,'Authorization':'Bearer '+AK};
let S={rm:null,ad:null,fit:[],acts:[],rmAll:[],rmHist:[],loaded:false,td:''};
let FR='3m';

const n=v=>{const x=Number(v);return(isNaN(x)||x===0)?null:x};
const fmt=(v,s='')=>v!==null&&v!==undefined?`${v}${s}`:'<span class="na">—</span>';
const fmtH=m=>{if(!m)return'<span class="na">—</span>';return`${Math.floor(m/60)}h${String(Math.round(m%60)).padStart(2,'0')}m`};
const td=()=>new Date().toISOString().slice(0,10);
const dAgo=n=>new Date(Date.now()-n*86400000).toISOString().slice(0,10);
const rcC=c=>(c==='verde'||c==='green')?'var(--teal)':(c==='amarillo'||c==='yellow')?'var(--amber)':'var(--rose)';
const rcK=c=>(c==='verde'||c==='green')?'ct':(c==='amarillo'||c==='yellow')?'ca':'cr';
const rcE=c=>(c==='verde'||c==='green')?'🟢':(c==='amarillo'||c==='yellow')?'🟡':'🔴';
const si=t=>({Swim:'🏊',Ride:'🚴',VirtualRide:'🚴',Run:'🏃',VirtualRun:'🏃',WeightTraining:'🏋️',Yoga:'🧘',TrailRun:'⛰️',Walk:'🚶'}[t]||'⚡');
const sc=t=>['Swim'].includes(t)?'var(--blue)':['Ride','VirtualRide'].includes(t)?'var(--amber)':['Run','VirtualRun','TrailRun'].includes(t)?'var(--teal)':'var(--violet)';
const sn=t=>({Swim:'Natación',Ride:'Ciclismo',VirtualRide:'Ciclismo',Run:'Carrera',VirtualRun:'Cinta',WeightTraining:'Fuerza',Yoga:'Yoga',TrailRun:'Trail'}[t]||t);

function ring(p,col,sz,sw,inner){
  const r=(sz-sw)/2,c=2*Math.PI*r,f=(Math.min(p||0,100)/100)*c;
  return`<div class="rw" style="width:${sz}px;height:${sz}px"><svg class="rs" width="${sz}" height="${sz}"><circle class="rb2" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke-width="${sw}"/><circle class="ra" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke-width="${sw}" style="stroke:${col}" stroke-dasharray="${f.toFixed(1)} ${c.toFixed(1)}"/></svg><div class="ri">${inner}</div></div>`;
}
function bar(p,col){return`<div class="bar"><div class="bf" style="width:${Math.min(100,p||0)}%;background:${col}"></div></div>`}

// ── INSIGHTS PROFESIONALES ─────────────────────────────────────────────────
function iHRV(v,b,acts7,rc){
  if(!v)return'Intervals aún no sincronizó — disponible después de las 9am. Revisa que el Garmin esté sincronizado con la app.';
  const d=((v-b)/b)*100;
  const heavy=acts7.filter(a=>new Date(a.fecha)>=new Date(Date.now()-86400000)&&(a.tss||0)>100);
  const mod=acts7.filter(a=>new Date(a.fecha)>=new Date(Date.now()-86400000)&&(a.tss||0)>50&&(a.tss||0)<=100);
  const hTSS=heavy.reduce((s,a)=>s+(a.tss||0),0);
  let ctx='',rec='';
  if(heavy.length)ctx=` Sesión de alta intensidad ayer (TSS ${hTSS}) suprime el SNA hasta 24-48h — es normal y esperado.`;
  else if(mod.length)ctx=` Entreno moderado ayer puede bajar el HRV levemente.`;
  if(d>=20){rec='Ventana anabólica óptima. Aprovecha para intervalos de alta intensidad, trabajo de umbral o sesión larga. El cuerpo está en capacidad de absorber carga.';return`↑↑ ${d.toFixed(0)}% sobre baseline.${ctx} ${rec}`}
  if(d>=10){rec='SNA bien recuperado. Día para entrenar con calidad — buena tolerancia a intensidad alta.';return`↑ ${d.toFixed(0)}% sobre baseline.${ctx} ${rec}`}
  if(d>=3){rec='Recuperación normal. Sigue el plan previsto sin modificaciones.';return`En baseline (${v} ms). ${ctx} ${rec}`}
  if(d>=-10){rec='Prioriza volumen en Z1-Z2. Evita series de alta intensidad. El SNA parasimpático necesita más tiempo.';return`↓ ${Math.abs(d).toFixed(0)}% bajo baseline.${ctx} ${rec}`}
  if(d>=-20){rec='Descarga activa: trote suave 30-45 min, movilidad, trabajo de respiración. No añadas estrés adicional.';return`↓↓ ${Math.abs(d).toFixed(0)}% bajo baseline. SNA bajo estrés significativo.${ctx} ${rec}`}
  return`↓↓↓ ${Math.abs(d).toFixed(0)}% bajo baseline. Señal de sobreentrenamiento, enfermedad o estrés agudo.${ctx} Reposo total. Si persiste >3 días, consulta con médico deportivo.`;
}

function iRHR(v,b){
  if(!v)return'FC reposo viene de Intervals.icu (sincronizado desde Garmin). Si no aparece, verifica la sincronización en la app.';
  const bRound=Math.round(b);
  const d=Math.round(v-b);
  if(d<=-5)return`${Math.abs(d)} bpm bajo tu base (${bRound} bpm). Adaptación cardiovascular positiva: mayor volumen sistólico, mejor eficiencia.`;
  if(d<=-3)return`${Math.abs(d)} bpm bajo base. Corazón eficiente. Señal de buena recuperación y adaptación cardiovascular.`;
  if(d<=2)return`Normal (${v} bpm, base ${bRound} bpm). Sin alarmas. Sistema autónomo equilibrado.`;
  if(d<=5)return`+${d.toFixed(0)} bpm sobre base. Posible fatiga acumulada, deshidratación o estrés. Hidrata bien (35ml/kg peso). Si persiste mañana, reduce carga.`;
  if(d<=8)return`+${d.toFixed(0)} bpm sobre base. Fatiga cardiovascular significativa. Verifica hidratación, calidad de sueño y carga de los últimos 7 días. Prioriza descanso.`;
  if(d<=12)return`+${d.toFixed(0)} bpm sobre base. Señal de alerta: sobreentrenamiento, inicio de enfermedad o estrés agudo. Reduce carga al 50% y monitorea 24-48h.`;
  return`+${d.toFixed(0)} bpm sobre base. Señal crítica. Posible enfermedad, sobreentrenamiento severo o estímulo estresante externo. Reposo y evaluación médica.`;
}

function iSlp(v,h,nd){
  if(!v)return'Sin datos de sueño. Verifica que el Garmin esté puesto al dormir y sincronizado con la app antes de las 9am.';
  const need=nd?(nd/60).toFixed(1):null;
  const def=h&&nd?(nd/60-h):0;
  let rec=def>0.5?` Esta noche necesitas ${need}h — no menos.`:def<=0?' Cuota cumplida. Mantén el horario.':'';
  if(v>=92)return`Sueño de élite (${v}%). Maximiza el beneficio: el cuerpo libera hormona de crecimiento principalmente en sueño profundo y procesa adaptaciones del entrenamiento.${rec}`;
  if(v>=82)return`Sueño excelente (${v}%). Procesos de recuperación muscular y consolidación neuromuscular óptimos. Aprovecha para sesiones técnicas.${rec}`;
  if(v>=72)return`Buen sueño (${v}%). Margen de mejora: más sueño profundo mejora la síntesis proteica y recuperación. Prueba acostarte 20-30 min antes.${rec}`;
  if(v>=60)return`Sueño regular (${v}%). Impacto en recuperación: menor tolerancia a la intensidad, mayor percepción de esfuerzo. Oscuridad total, temperatura 17-19°C, sin pantallas 1h antes.${rec}`;
  if(v>=48)return`Sueño insuficiente (${v}%). Evidencia científica: menos de 7h aumenta riesgo de lesión 1.7x, eleva cortisol y reduce síntesis proteica. Prioriza sueño sobre cualquier sesión de entrenamiento.${rec}`;
  return`Sueño crítico (${v}%). Déficit severo: no compenses con cafeína. El entrenamiento con este nivel de sueño es contraproducente y aumenta riesgo de lesión. Descansa primero.${rec}`;
}

function iResp(v,hist){
  if(!v)return'Ingresa resp:XX en Intervals → Bienestar → Comments cada mañana. La frecuencia respiratoria nocturna es indicador temprano de enfermedad y sobreentrenamiento.';
  const bl=hist&&hist.length>3?hist.filter(h=>h.resp_rate).map(h=>Number(h.resp_rate)).filter(Boolean):null;
  const blMean=bl&&bl.length?Math.round(bl.reduce((a,b)=>a+b,0)/bl.length*10)/10:null;
  const ctx=blMean?` Tu media personal: ${blMean} brpm.`:'';
  if(v<=11)return`${v} brpm.${ctx} Muy bajo. Puede indicar sueño muy profundo (positivo) o calibración del sensor.`;
  if(v<=14)return`${v} brpm.${ctx} Excelente. Rango óptimo para triatletas de élite (12-14 brpm). Sistema cardiorrespiratorio muy eficiente.`;
  if(v<=16)return`${v} brpm.${ctx} Normal. Rango fisiológico estándar. Sin alarmas.`;
  if(v<=18)return`${v} brpm.${ctx} Levemente elevado. Posible fatiga acumulada, estrés o inicio de enfermedad. Monitorea los próximos días.`;
  if(v<=21)return`${v} brpm.${ctx} Elevado. Señal de estrés fisiológico: puede preceder síntomas de resfriado/gripe 24-48h antes. Reduce carga y descansa.`;
  return`${v} brpm.${ctx} Muy elevado. Señal de alarma: enfermedad activa, sobreentrenamiento o estrés agudo. Reposo y evaluación.`;
}

function iRecovery(score,rc,hrv,rhr,slp){
  if(!score)return'';
  if(score>=80)return`Recovery óptimo (${score}%). El cuerpo está en estado parasimpático dominante — máxima capacidad de absorber carga de entrenamiento. Ideal para sesión de calidad o carga alta.`;
  if(score>=67)return`Bien recuperado (${score}%). Capaz de entrenar con normalidad. Prioriza sesiones planificadas de mayor intensidad dentro de lo programado.`;
  if(score>=50)return`Recuperación moderada (${score}%). Entrena pero ajusta expectativas: puede requerir más RPE para la misma carga. Zona 2 segura, threshold con precaución.`;
  if(score>=34)return`Recuperación baja (${score}%). Cuerpo bajo estrés fisiológico. Prioriza Z1-Z2. Si el plan indica sesión intensa, consideras posponerla o reducir volumen al 60%.`;
  return`Recovery crítico (${score}%). El entrenamiento hoy podría ser contraproducente: mayor riesgo de lesión, sobreentrenamiento y supresión inmune. Descansa. El descanso también es entrenamiento.`;
}

function iTSB(t){
  if(t===null)return'';
  if(t>30)return'🌟 Muy fresco (TSB>30). Máxima capacidad competitiva. Ideal para A-race o test de rendimiento. Si no hay competencia, añade carga.';
  if(t>15)return'✅ Fresco (15-30). Excelentes condiciones para sesiones de calidad, series y trabajo de umbral.';
  if(t>5)return'💪 Forma positiva (5-15). Buen estado para competir o sesiones de calidad. Zona ideal pre-carrera.';
  if(t>-5)return'🎯 Zona neutra (-5 a 5). Balance entre fitness y fatiga. Zona óptima para Ironman race day.';
  if(t>-15)return'⚡ Fatiga moderada (-15 a -5). Normal en bloque de entrenamiento. El fitness está subiendo. Sigue el plan.';
  if(t>-25)return'⚠️ Fatiga alta (-25 a -15). Monitorea señales de sobreentrenamiento: HRV, FC reposo, motivación. Considera semana de carga reducida.';
  if(t>-35)return'🔴 Fatiga muy alta (-35 a -25). Zona de riesgo. Prioriza recuperación. Una semana de descarga aquí previene semanas de lesión.';
  return'🚨 Fatiga extrema (>35). Señal de alerta máxima. Semana de recuperación obligatoria. Consulta con entrenador.';
}

async function syncAll(){
  const btn=document.getElementById('sb');
  btn.textContent='⟳';
  btn.style.opacity='.7';
  try {
    // Llama a nyso-trigger que tiene CORS habilitado
    const r = await fetch(`${SU}/functions/v1/nyso-trigger`, {
      method:'POST',
      headers:{...H,'Content-Type':'application/json'},
      body:'{}'
    });
    const d = await r.json();
    if(d.ok){
      btn.textContent='✓ '+d.act_rows+'s';
      setTimeout(()=>{btn.textContent='↻ SYNC';btn.style.opacity='1';},2500);
    } else {
      btn.textContent='Error';
      setTimeout(()=>{btn.textContent='↻ SYNC';btn.style.opacity='1';},2500);
    }
  } catch(e) {
    btn.textContent='↻ SYNC';
    btn.style.opacity='1';
  }
  S.loaded=false;
  await loadAll(true);
}

async function loadAll(forceRefresh=false){
  if(S.loaded&&!forceRefresh){return}
  try{
    const today=td();
    const [rmAll,rmHist,adR,fitR,actsR]=await Promise.all([
      qS('recovery_metrics','order=fecha.desc&limit=14&select=*'),
      qS('recovery_metrics','order=fecha.desc&limit=90&select=fecha,hrv_hoy,fc_reposo_hoy,horas_sueno,sleep_perf_pct,resp_rate,recovery_score,recovery_color,hrv_baseline,fc_reposo_baseline'),
      qS('analisis_diarios',`fecha=eq.${today}&select=ctl,atl,tsb`),
      qS('fitness_diario','order=fecha.asc&select=fecha,ctl,atl,tsb'),
      qS('actividades','order=fecha.desc&limit=50&select=*')
    ]);
    const rm=rmAll.find(r=>n(r.hrv_hoy)!==null)||rmAll[0]||{};
    const fitArr=Array.isArray(fitR)?fitR:[];
    // Fallback: si analisis_diarios no tiene datos de hoy, usar el último de fitness_diario
    const lastFit=fitArr[fitArr.length-1]||{};
    const adRaw=adR[0]||{};
    const ad={
      ctl: n(adRaw.ctl)??n(lastFit.ctl)??0,
      atl: n(adRaw.atl)??n(lastFit.atl)??0,
      tsb: n(adRaw.tsb)??n(lastFit.tsb)??0
    };
    S={rm,ad,fit:fitArr,acts:Array.isArray(actsR)?actsR:[],rmAll,rmHist:Array.isArray(rmHist)?rmHist:[],loaded:true,td:today};
    rRec();rFit(FR);rVol();rAct();rHW();
  }catch(e){
    ['rc','fc','vc','ac','hc'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)el.innerHTML=`<div class="loader" style="color:var(--rose)">Error: ${e.message}</div>`;
    });
  }
}

  const W=360,H=160,PL=36,PR=8,PT=8,PB=22,cw=W-PL-PR,ch=H-PT-PB;
  const all=[...data.map(d=>d.ctl),...data.map(d=>d.atl),...data.map(d=>d.tsb)];

    else if(tsb>-10)ins.push(`⚖️ <b>TSB ${tsb.toFixed(1)} zona de trabajo</b> — balance ideal para bloque de entrenamiento. Sigue el plan.`);
    else if(tsb>-20)ins.push(`⚡ <b>TSB ${tsb.toFixed(1)} fatiga acumulada</b> — señal de bloque efectivo. Monitorea HRV diariamente. Semana de descarga si llevas >2 semanas acá.`);
    else ins.push(`⚠️ <b>TSB ${tsb.toFixed(1)} fatiga elevada</b> — prioriza recuperación esta semana. Más carga ahora es contraproducente.`);
    if(ratio>1.15)ins.push(`🔥 <b>ATL/CTL ${ratio.toFixed(2)}</b> — carga aguda supera fitness crónico. Zona de riesgo si se sostiene >2 semanas.`);
    else if(ratio<0.85)ins.push(`💤 <b>ATL/CTL ${ratio.toFixed(2)}</b> — carga reciente muy baja vs fitness. Considera aumentar estímulo para evitar desentrenamiento.`);
    if(ctl<100)ins.push(`🏝️ <b>Hawaii ${diff}d</b>: CTL ${(ctl??0).toFixed(0)} necesita crecer. Foco en Z2 aeróbico las próximas 6-8 semanas antes de añadir intensidad.`);
    else if(ctl<120)ins.push(`🏝️ <b>Hawaii ${diff}d</b>: CTL ${(ctl??0).toFixed(0)} en buen camino. Consistencia + tapers estratégicos llevarán al objetivo 120-130 para race day.`);
    else ins.push(`🏝️ <b>Hawaii ${diff}d</b>: CTL ${(ctl??0).toFixed(0)} excelente. Foco en calidad: race pace, brick workouts y ensayos nutricionales.`);
    return ins.map(i=>`<div class="ins" style="border-color:var(--blue);margin-bottom:6px">${i}</div>`).join('');
  })()}
</div>`;
}

// ── VOLUMEN ────────────────────────────────────────────────────────────────
function rVol(){
  const {acts}=S;
  const now=new Date(),dow=now.getDay()===0?6:now.getDay()-1;
  const ws=new Date(now.getTime()-dow*86400000).toISOString().slice(0,10);
  const pws=new Date(new Date(ws).getTime()-7*86400000).toISOString().slice(0,10);
  const aC=acts.filter(a=>a.fecha>=ws);
  const aP=acts.filter(a=>a.fecha>=pws&&a.fecha<ws);
  const gS=(list,type)=>list.filter(a=>type==='Swim'?a.tipo==='Swim':type==='Ride'?['Ride','VirtualRide'].includes(a.tipo):type==='Run'?['Run','VirtualRun','TrailRun'].includes(a.tipo):a.tipo===type);
  const rows=[{k:'Swim',name:'Natación',icon:'🏊',col:'var(--blue)'},{k:'Ride',name:'Ciclismo',icon:'🚴',col:'var(--amber)'},{k:'Run',name:'Carrera',icon:'🏃',col:'var(--teal)'},{k:'WeightTraining',name:'Fuerza',icon:'🏋️',col:'var(--violet)'},{k:'Yoga',name:'Yoga',icon:'🧘',col:'var(--soft)'}];
  const tC=aC.reduce((s,a)=>s+(a.tss||0),0),tP=aP.reduce((s,a)=>s+(a.tss||0),0);
  const ramp=tP>0?((tC-tP)/tP*100):0;
  const totDur=t=>t.reduce((s,a)=>s+(a.duracion_min||0),0);
  const totKm=t=>t.reduce((s,a)=>s+(parseFloat(a.distancia_km)||0),0);

  document.getElementById('vc').innerHTML=`
<div class="card">
  <div class="chd">📅 Semana Actual <span style="color:var(--faint)">desde lunes ${ws.slice(5)}</span></div>
  <div class="g3" style="margin-bottom:10px">
    <div class="ci"><div class="cl3">Sesiones</div><div class="cv3 ct">${aC.length}</div></div>
    <div class="ci"><div class="cl3">TSS</div><div class="cv3 ca">${tC}</div></div>
    <div class="ci"><div class="cl3">Rampa</div><div class="cv3 ${Math.abs(ramp)>15?'cr':ramp>0?'ca':'ct'}">${ramp>0?'+':''}${ramp.toFixed(0)}%</div></div>
  </div>
  ${ramp>15?`<div class="ins" style="border-color:var(--amber)">⚠️ Rampa +${ramp.toFixed(0)}% sobre semana anterior. Evidencia científica sugiere que >10-15% de incremento semanal aumenta riesgo de lesión por sobrecarga. Limita el volumen restante esta semana.</div>`:''}
  ${ramp<-30?`<div class="ins" style="border-color:var(--teal)">↓ Semana de recuperación activa (${ramp.toFixed(0)}% vs anterior). Normal en periodización. El superávit de recuperación permitirá mayor carga la próxima semana.</div>`:''}
</div>
<div class="card">
  <div class="chd">🏊🚴🏃 Volumen por Disciplina</div>
  <table class="vt">
    <thead><tr><th>Deporte</th><th>Tiempo</th><th>Km</th><th>TSS</th><th>Δ sem</th></tr></thead>
    <tbody>
    ${rows.map(r=>{
      const gc=gS(aC,r.k),gp=gS(aP,r.k);
      if(!gc.length&&!gp.length)return'';
      const dur=gc.reduce((s,a)=>s+(a.duracion_min||0),0);
      const km=gc.reduce((s,a)=>s+(parseFloat(a.distancia_km)||0),0);
      const tss=gc.reduce((s,a)=>s+(a.tss||0),0);
      const tssP=gp.reduce((s,a)=>s+(a.tss||0),0);
      const delta=tssP>0?((tss-tssP)/tssP*100):null;
      return`<tr>
        <td><span style="color:${r.col};font-weight:600">${r.icon} ${r.name}</span></td>
        <td style="font-size:10px;color:var(--soft)">${dur?`${Math.floor(dur/60)}h${String(dur%60).padStart(2,'0')}m`:'—'}</td>
        <td style="font-size:10px;color:var(--soft)">${km?km.toFixed(0)+'km':'—'}</td>
        <td style="color:var(--amber);font-weight:600">${tss||'—'}</td>
        <td style="font-size:10px;color:${delta>0?'var(--rose)':'var(--teal)'}">${delta!==null?(delta>0?'+':'')+delta.toFixed(0)+'%':'—'}</td>
      </tr>`;
    }).join('')}
    <tr style="font-weight:700;border-top:1px solid var(--faint)">
      <td>Total</td>
      <td style="font-size:10px">${(()=>{const t=totDur(aC);return t?`${Math.floor(t/60)}h${String(t%60).padStart(2,'0')}m`:'—'})()}</td>
      <td style="font-size:10px">${(()=>{const k=totKm(aC);return k?k.toFixed(0)+'km':'—'})()}</td>
      <td style="color:var(--amber)">${tC}</td><td></td>
    </tr>
    </tbody>
  </table>
</div>
<div class="card">
  <div class="chd">📅 Semana Anterior <span style="color:var(--faint)">${pws.slice(5)}</span></div>
  <div style="font-size:11px;color:var(--soft);display:flex;gap:14px;font-family:'Space Mono',monospace;flex-wrap:wrap">
    <span>${aP.length} ses.</span><span class="ca">TSS ${tP}</span>
    <span>${(()=>{const t=totDur(aP);return t?`${Math.floor(t/60)}h${String(t%60).padStart(2,'0')}m`:'—'})()}</span>
    <span>${(()=>{const k=totKm(aP);return k?k.toFixed(0)+'km':'—'})()}</span>
  </div>
</div>`;
}

// ── ACTIVIDADES ────────────────────────────────────────────────────────────
function rAct(){
  const {acts}=S;
  const byDate={};
  acts.slice(0,30).forEach(a=>{const d=a.fecha;if(!byDate[d])byDate[d]=[];byDate[d].push(a)});
  const html=Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const da=byDate[date];
    const dt=da.reduce((s,a)=>s+(a.tss||0),0);
    const rmDay=S.rmHist.find(r=>r.fecha===date);
    const recBadge=rmDay?`${rcE(rmDay.recovery_color)} ${rmDay.recovery_score}%`:'';
    return`<div class="card">
      <div class="chd">${date.slice(5)} <span class="ca">TSS ${dt}</span> <span style="font-size:9px;color:var(--soft)">${recBadge}</span></div>
      ${da.map(a=>{
        const col=sc(a.tipo);
        const dur=a.duracion_min;
        const km=parseFloat(a.distancia_km)||0;
        const pw=a.potencia_avg?`${a.potencia_avg}W/NP${a.potencia_np}`:'';
        const hr=a.fc_avg?`FC ${a.fc_avg}`:'';
        const meta=[dur?`${Math.floor(dur/60)}h${String(dur%60).padStart(2,'0')}m`:'',km?km.toFixed(1)+'km':'',pw,hr].filter(Boolean).join(' · ');
        return`<button class="ai" onclick="openAct('${a.id}','${(a.nombre||sn(a.tipo)).replace(/'/g,"\\'")}' )" style="width:100%;background:none;border:none;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,229,200,.1)">
          <div class="aic" style="background:${col}18;border:1px solid ${col}35">${si(a.tipo)}</div>
          <div class="aib"><div class="ain">${a.nombre||sn(a.tipo)}</div><div class="aim">${meta}</div></div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="ait">${a.tss||'—'}</div>
            <span style="color:var(--faint);font-size:14px">›</span>
          </div>
        </button>`;
      }).join('')}
    </div>`;
  }).join('');
  document.getElementById('ac').innerHTML=html||'<div class="loader">Sin actividades</div>';
}

// ── HAWAII ─────────────────────────────────────────────────────────────────
function rHW(){
  const {fit,acts}=S;
  const hw=new Date('2026-10-10');
  const diff=Math.round((hw.getTime()-Date.now())/86400000);
  const lat=fit[fit.length-1]||{};
  const ctl=lat.ctl||0,tsb=lat.tsb||0;
  const ctlT=130,tapDate=new Date(hw.getTime()-21*86400000);
  const dTap=Math.round((tapDate.getTime()-Date.now())/86400000);
  const wBuild=Math.max(0,Math.floor(dTap/7));
  const tss7=acts.filter(a=>new Date(a.fecha)>=new Date(Date.now()-7*86400000)).reduce((s,a)=>s+(a.tss||0),0);
  const k=1/42;let pCTL=ctl;
  for(let i=0;i<diff;i++){const d=i<dTap?tss7/7:(tss7/7)*0.4;pCTL=pCTL+(d-pCTL)*(1-Math.exp(-k))}
  const last30=fit.slice(-30),maxC=Math.max(...last30.map(d=>d.ctl),1);
  const peakCTL=Math.max(...fit.map(d=>d.ctl)||[0]);
  const peakDate=fit.find(d=>d.ctl===peakCTL)?.fecha||'';

  document.getElementById('hc').innerHTML=`
<div class="hwb">
  <div class="hwn">${diff}</div>
  <div class="hwl">DÍAS PARA IRONMAN HAWAII · 10 OCT 2026</div>
  <div class="hwp">
    <div>📍 CTL actual <b class="cb">${(ctl??0).toFixed(0)}</b> · Objetivo <b class="ct">${ctlT}</b> · Gap <b class="${ctl>=ctlT?'ct':'ca'}">${(ctl-ctlT).toFixed(0)}</b></div>
    <div>🏆 CTL peak histórico: <b class="cv2">${peakCTL.toFixed(0)}</b>${peakDate?' el '+peakDate.slice(5):''}</div>
    <div>📅 Build: <b class="cv2">${wBuild}</b> semanas · Taper desde ${tapDate.toISOString().slice(0,10).slice(5)}</div>
    <div>🎯 CTL proyectado race day: <b class="${pCTL>=ctlT?'ct':'ca'}">${pCTL.toFixed(0)}</b> ${pCTL>=ctlT?'✅ En objetivo':'⚠️ Ajustar carga'}</div>
    <div>📊 TSS 7d: <b class="ca">${tss7}</b> · Prom/día: <b class="ca">${(tss7/7).toFixed(0)}</b></div>
  </div>
</div>
<div class="card">
  <div class="chd">🧠 Análisis para Hawaii</div>
  <div class="ins" style="border-color:${pCTL>=ctlT?'var(--teal)':'var(--amber)'}">
    ${pCTL>=ctlT
      ?`✅ Proyección favorable: con tu carga actual llegarás a Hawaii con CTL ~${pCTL.toFixed(0)}. El peak histórico de ${peakCTL.toFixed(0)} confirma que tienes el fitness base. Clave: mantener consistencia en las ${wBuild} semanas de build y ejecutar bien el taper de 3 semanas.`
      :`⚠️ Necesitas aumentar ~${Math.round((ctlT-pCTL)/wBuild*7)} TSS/semana en los próximos ${wBuild} semanas para alcanzar CTL ${ctlT}. Distribuye incrementos graduales ≤10% semanal para evitar lesión. Foco en volumen aeróbico Z2 antes de añadir intensidad.`
    }
  </div>
</div>
<div class="card">
  <div class="chd">🏁 Hoja de ruta</div>
  ${[['TSB objetivo race day','-5 a +5','ct'],['CTL objetivo mínimo',`${ctlT}+`,'cb'],['Inicio taper',tapDate.toISOString().slice(0,10),'cv2'],['Semanas de build',`${wBuild} sem`,'cb'],['TSS/semana proyectado',`${Math.round(tss7*1.05)}-${Math.round(tss7*1.12)}`,'ca'],['CTL peak histórico',`${peakCTL.toFixed(0)}`,'cv2']].map(([l,v,c])=>`
  <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--edge);font-size:11px">
    <span style="color:var(--soft)">${l}</span>
    <span class="${c}" style="font-family:'Space Mono',monospace;font-size:10px">${v}</span>
  </div>`).join('')}
</div>
<div class="card">
  <div class="chd">📈 CTL últimos 30 días</div>
  <div style="display:flex;align-items:flex-end;gap:3px;height:48px">
    ${last30.map((d,i)=>{const h=Math.round((d.ctl/maxC)*48);const last=i===last30.length-1;return`<div style="flex:1;height:${Math.max(2,h)}px;background:${last?'var(--blue)':'#4d9fff35'};border-radius:2px 2px 0 0;${last?'box-shadow:0 0 6px var(--blue)':''}"></div>`}).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:8px;color:var(--faint);font-family:'Space Mono',monospace">
    <span>${last30[0]?.fecha.slice(5)}</span><span>hoy ${(ctl??0).toFixed(0)}</span>
  </div>
</div>`;
}

function show(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('a'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('a'));
  document.getElementById(id).classList.add('a');
  const tabs=['recovery','fitness','volume','acts','hawaii'];
  document.querySelectorAll('.tab')[tabs.indexOf(id)]?.classList.add('a');
  if(id==='fitness'&&S.loaded)rFit(FR);
}

loadAll();
</script>
